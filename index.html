<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PO Trading Analyzer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080C12;color:#E8F0FE;font-family:monospace;font-size:13px}
.header{display:flex;align-items:center;padding:0 16px;height:50px;border-bottom:1px solid #1E2D40;gap:16px}
.dot{width:8px;height:8px;background:#00E676;border-radius:50%;box-shadow:0 0 8px #00E676}
.brand{font-size:12px;font-weight:800;letter-spacing:3px}
.nav{flex:1;display:flex;justify-content:center;gap:4px}
.nav button{background:none;border:none;border-bottom:2px solid transparent;color:#546E7A;padding:6px 16px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase;font-family:monospace}
.nav button.active{color:#00E5FF;border-bottom-color:#00E5FF;background:#2979FF22}
.filters{display:flex;gap:8px;padding:8px 16px;border-bottom:1px solid #1A2535;align-items:center}
.filters button{background:none;border:1px solid transparent;border-radius:20px;padding:3px 14px;font-size:11px;cursor:pointer;font-weight:700;color:#546E7A;font-family:monospace}
.filters button.win{color:#00E676;border-color:#00E67644;background:#00E67622}
.filters button.loss{color:#FF1744;border-color:#FF174444;background:#FF174422}
.filters button.all{color:#00E5FF;border-color:#2979FF44;background:#2979FF22}
.content{padding:14px}
.card{background:#111927;border:1px solid #1E2D40;border-radius:12px;padding:16px;margin-bottom:12px}
.card.hero{padding:20px 24px;border-radius:14px}
.label{font-size:10px;color:#546E7A;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.big{font-size:30px;font-weight:800;font-family:monospace;line-height:1}
.wins{color:#00E676}.losses{color:#FF1744}.gold{color:#FFD600}
.green{color:#00E676}.red{color:#FF1744}.muted{color:#546E7A}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.bar-wrap{background:#1A2535;border-radius:3px;height:4px;margin-top:10px;overflow:hidden}
.bar{height:100%;border-radius:3px}
.trade-row{display:grid;grid-template-columns:42px 58px 130px 1fr 58px 65px;gap:6px;padding:9px 12px;background:#111927;border:1px solid #1E2D40;border-radius:8px;align-items:center;margin-bottom:5px;cursor:pointer;border-left-width:3px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:1px}
.section-label{font-size:10px;color:#546E7A;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.best-card{background:#1A2535;border-radius:10px;padding:14px 16px}
.modal-bg{position:fixed;inset:0;background:#000b;z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#0D1520;border:1px solid #1E2D40;border-radius:14px;padding:22px;width:460px;max-width:94vw;max-height:88vh;overflow:auto}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.modal-field{background:#111927;border-radius:8px;padding:10px 14px;border:1px solid #1E2D40}
.close-btn{background:none;border:none;color:#546E7A;font-size:22px;cursor:pointer;line-height:1}
canvas{max-width:100%}
.upload-msg{background:#00E67622;border-bottom:1px solid #00E67633;padding:7px 16px;font-size:11px;color:#00E676;font-weight:700}
.empty{text-align:center;padding:40px 24px}
.empty-icon{font-size:32px;margin-bottom:12px}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:8px">
    <div class="dot"></div>
    <span class="brand">PO TRADING</span>
  </div>
  <div class="nav">
    <button id="btn-dashboard" class="active" onclick="setView('dashboard')">Overview</button>
    <button id="btn-today" onclick="setView('today')">Today</button>
    <button id="btn-trades" onclick="setView('trades')">Trades</button>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button onclick="document.getElementById('fileInput').click()" style="background:none;color:#546E7A;border:1px solid #1E2D40;border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:monospace">+ Upload</button>
    <input id="fileInput" type="file" accept=".xlsx,.xls" style="display:none" onchange="handleUpload(event)"/>
    <span id="tradeCount" style="font-size:11px;color:#546E7A">0 trades</span>
    <span id="liveStatus" style="font-size:10px;color:#546E7A;letter-spacing:1px">Loading...</span>
  </div>
</div>

<div id="uploadMsg" style="display:none" class="upload-msg"></div>

<div class="filters">
  <button id="f-All" class="all" onclick="setFilter('All')">All</button>
  <button id="f-WIN" onclick="setFilter('WIN')" style="background:none;border:1px solid transparent;border-radius:20px;padding:3px 14px;font-size:11px;cursor:pointer;font-weight:700;color:#546E7A;font-family:monospace">WIN</button>
  <button id="f-LOSS" onclick="setFilter('LOSS')" style="background:none;border:1px solid transparent;border-radius:20px;padding:3px 14px;font-size:11px;cursor:pointer;font-weight:700;color:#546E7A;font-family:monospace">LOSS</button>
  <span id="filterCount" style="font-size:10px;color:#546E7A;margin-left:4px"></span>
</div>

<div class="content" id="content"></div>

<div id="modal" class="modal-bg" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="display:flex;gap:8px;align-items:center">
        <div id="modal-dot" style="width:9px;height:9px;border-radius:50%"></div>
        <span id="modal-title" style="font-size:15px;font-weight:800"></span>
        <span id="modal-result-tag" class="tag"></span>
        <span id="modal-dir-tag" class="tag"></span>
      </div>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-grid" id="modal-fields"></div>
    <div style="background:#111927;border-radius:10px;padding:14px;border:1px solid #1E2D40">
      <div class="label" style="margin-bottom:10px">Price Movement</div>
      <div style="display:flex;align-items:center;gap:12px">
        <div style="text-align:center">
          <div style="font-size:9px;color:#546E7A">ENTRY</div>
          <div id="modal-entry" style="font-size:15px;font-weight:800;color:#00E5FF;font-family:monospace"></div>
        </div>
        <div id="modal-line" style="flex:1;height:2px;border-radius:1px"></div>
        <div style="text-align:center">
          <div style="font-size:9px;color:#546E7A">EXIT</div>
          <div id="modal-exit" style="font-size:15px;font-weight:800;font-family:monospace"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

function addCumPL(arr){
  let c=0;
  return arr.filter(t=>t.payout!==0).map(t=>{c=+(c+t.payout).toFixed(2);return{...t,cumPL:c};});
}
function fmtHour(h){const hr=parseInt(h);if(hr===0)return"12am";if(hr<12)return hr+"am";if(hr===12)return"12pm";return(hr-12)+"pm";}
function fmtMoney(v){return(v>=0?"+$":"-$")+Math.abs(v).toFixed(2);}
function fmtTime(ts){
  if(!ts||ts.length<16) return ts||"";
  const parts=ts.slice(11,16).split(":");
  let h=parseInt(parts[0]),m=parts[1];
  const ampm=h>=12?"pm":"am";
  h=h%12||12;
  return h+":"+m+ampm;
}
function wrColor(wr){return wr>=0.6?"#00E676":wr>=0.5?"#FFD600":"#FF1744";}

// ── Upload ────────────────────────────────────────────────────────────────
function handleUpload(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:"binary"});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});
      const parsed=rows.slice(1).map((row,i)=>{
        const profit=parseFloat(row[9])||0; if(profit===0)return null;
        const stake=parseFloat(row[8])||0;
        const openTime=(row[4]||"").toString();
        const m=openTime.match(/(\d{1,2}):(\d{2})/);
        return{id:i+1,orderId:(row[1]||"").toString().trim(),openTime,closeTime:(row[5]||"").toString(),
          asset:(row[3]||"UNKNOWN").toString(),direction:(row[0]||"").toString().toUpperCase()||"CALL",
          stake,payout:profit,payoutPct:stake>0&&profit>0?+(profit/stake).toFixed(4):0,
          result:profit>0?"WIN":"LOSS",signal:"Untagged",autoTrade:false,
          hour:m?parseInt(m[1]):0,openPrice:parseFloat(row[6])||0,closePrice:parseFloat(row[7])||0};
      }).filter(Boolean);
      const ids=new Set(ALL_TRADES.map(t=>t.orderId).filter(Boolean));
      const newT=parsed.filter(t=>!ids.has(t.orderId));
      const maxId=ALL_TRADES.reduce((m,t)=>Math.max(m,t.id),0);
      ALL_TRADES=addCumPL([...ALL_TRADES,...newT.map((t,i)=>({...t,id:maxId+i+1}))].sort((a,b)=>a.openTime.localeCompare(b.openTime)));
      showMsg("+"+newT.length+" new, "+(parsed.length-newT.length)+" skipped");
      render();
    }catch(err){alert("Error: "+err.message);}
  };
  reader.readAsBinaryString(file);
  e.target.value="";
}

function showMsg(txt){
  const m=document.getElementById("uploadMsg");
  m.textContent=txt; m.style.display="block";
  setTimeout(()=>m.style.display="none",4000);
}

function drawCurve(canvasId, data, color){
  // Daily bar chart
  const canvas=document.getElementById(canvasId);
  if(!canvas||!data.length)return;
  const ctx=canvas.getContext("2d");
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const vals=data.map(d=>d.pl);
  const maxVal=Math.max(...vals,0);
  const minVal=Math.min(...vals,0);
  // Force zero as baseline — positive bars go up, negative go down
  const aboveMax=maxVal||1;
  const belowMin=Math.abs(minVal)||0;
  const totalRange=aboveMax+belowMin||1;
  const padL=72,padR=16,padT=20,padB=32;
  const chartW=W-padL-padR;
  const chartH=H-padT-padB;
  const barW=Math.max(4,chartW/data.length*0.7);
  const gap=chartW/data.length;
  // Zero is always at fixed position: proportional to how much is below zero
  const zeroY=padT+((aboveMax)/totalRange)*chartH;
  const toY=v=>v>=0?zeroY-(v/totalRange)*chartH:zeroY+(Math.abs(v)/totalRange)*chartH;

  // Grid lines — show 0, max/2, max on positive; min/2, min on negative
  ctx.font="22px monospace"; ctx.textAlign="right"; ctx.fillStyle="#546E7A";
  const gridVals=[minVal, minVal/2, 0, maxVal/2, maxVal].filter(v=>v!==undefined);
  gridVals.forEach(v=>{
    const y=toY(v);
    if(y<padT||y>H-padB) return;
    const label=v<0?"$-"+Math.abs(Math.round(v)).toLocaleString():"$"+Math.round(v).toLocaleString();
    ctx.fillText(label,padL-6,y+6);
    ctx.strokeStyle="#1E2D4066"; ctx.lineWidth=1; ctx.setLineDash([3,4]);
    ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
  });
  ctx.setLineDash([]);

  // Zero baseline — prominent
  ctx.strokeStyle="#546E7ABB"; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(padL,zeroY); ctx.lineTo(W-padR,zeroY); ctx.stroke();

  // Bars
  data.forEach((d,i)=>{
    const x=padL+i*gap+(gap-barW)/2;
    const barColor=d.pl>=0?"#00E676":"#FF1744";
    const barTop=d.pl>=0?toY(d.pl):zeroY;
    const barBot=d.pl>=0?zeroY:toY(d.pl);
    const barH=Math.max(2,barBot-barTop);
    // Bar fill
    ctx.fillStyle=barColor+"CC";
    ctx.beginPath();
    ctx.roundRect?ctx.roundRect(x,barTop,barW,barH,3):ctx.rect(x,barTop,barW,barH);
    ctx.fill();
    // Bar border
    ctx.strokeStyle=barColor;ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.roundRect?ctx.roundRect(x,barTop,barW,barH,3):ctx.rect(x,barTop,barW,barH);
    ctx.stroke();
  });

  // X axis dates
  ctx.font="20px monospace"; ctx.textAlign="center"; ctx.fillStyle="#546E7A";
  const step=Math.max(1,Math.floor(data.length/5));
  data.forEach((d,i)=>{
    if(i%step===0||i===data.length-1){
      ctx.fillText(d.label,padL+i*gap+gap/2,H-6);
    }
  });
  return; // skip old code below
}

  // toX: trade index → pixel X
  const toX=i=>padL+(i/(data.length-1||1))*(W-padL-padR);
  // toY: dollar value → pixel Y (top=max, bottom=min)
  const toY=v=>padT+((maxVal-v)/range)*(H-padT-padB);

  // Grid + Y axis labels (0 at bottom up to max at top)
  ctx.font="22px monospace"; ctx.textAlign="right"; ctx.fillStyle="#546E7A";
  const steps=4;
  for(let s=0;s<=steps;s++){
    const v=minVal+(s/steps)*range;
    const y=toY(v);
    const label=v<0?"$-"+Math.abs(Math.round(v)).toLocaleString():"$"+Math.round(v).toLocaleString();
    ctx.fillText(label,padL-6,y+6);
    ctx.strokeStyle="#1E2D4088"; ctx.lineWidth=1; ctx.setLineDash([3,4]);
    ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
  }
  ctx.setLineDash([]);

  // X axis: show 5 evenly spaced dates
  ctx.font="20px monospace"; ctx.textAlign="center"; ctx.fillStyle="#546E7A";
  const xCount=Math.min(5,data.length);
  for(let s=0;s<xCount;s++){
    const idx=Math.floor(s*(data.length-1)/(xCount-1||1));
    ctx.fillText(data[idx].date||"",toX(idx),H-6);
  }

  // Zero line
  if(minVal<0){
    const zy=toY(0);
    ctx.strokeStyle="#FF174488"; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(padL,zy); ctx.lineTo(W-padR,zy); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Fill
  const grad=ctx.createLinearGradient(0,padT,0,H-padB);
  grad.addColorStop(0,color+"55"); grad.addColorStop(1,color+"05");
  ctx.beginPath();
  ctx.moveTo(toX(0),toY(vals[0]));
  data.forEach((d,i)=>ctx.lineTo(toX(i),toY(d.pl)));
  ctx.lineTo(toX(data.length-1),H-padB);
  ctx.lineTo(padL,H-padB); ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();

  // Line
  ctx.strokeStyle=color; ctx.lineWidth=2.5; ctx.beginPath();
  data.forEach((d,i)=>i===0?ctx.moveTo(toX(i),toY(d.pl)):ctx.lineTo(toX(i),toY(d.pl)));
  ctx.stroke();
}

// ── Live Sheets fetch ────────────────────────────────────────────────────
const SHEETS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSMFwWAlgUMZwsBzqHK58W1QoU8FWG3f2zgJ0ZWJRxCpfEkXN70af3aMa_jTqcjKI5KdDKn2qyS4VWe/pub?gid=0&single=true&output=csv";

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim().replace(/"/g,"").toLowerCase());
  return lines.slice(1).map((line, idx) => {
    // Handle quoted fields with commas
    const vals = [];
    let cur = "", inQ = false;
    for (let c of line) {
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ""; }
      else cur += c;
    }
    vals.push(cur.trim());
    const row = {};
    headers.forEach((h, i) => row[h] = (vals[i] || "").replace(/"/g, ""));

    const profit = parseFloat(row["payout"]) || 0;
    if (profit === 0) return null;
    const stake = parseFloat(row["stake"]) || 0;
    const rawOT = row["open time"] || "";
    function shiftUTC(ts){if(!ts)return ts;try{const d=new Date(ts.replace(" ","T")+"Z");d.setHours(d.getHours()-4);return d.toISOString().slice(0,19).replace("T"," ");}catch(e){return ts;}}
    const openTime = shiftUTC(rawOT);
    const m = openTime.match(/(\d{1,2}):(\d{2})/);
    return {
      id: idx + 1,
      orderId: row["order id"] || "",
      openTime, closeTime: row["close time"] || "",
      asset: row["asset"] || "AUD/CAD OTC",
      direction: (row["direction"] || "CALL").toUpperCase(),
      stake, payout: profit,
      payoutPct: stake > 0 && profit > 0 ? +(profit/stake).toFixed(4) : 0,
      result: profit > 0 ? "WIN" : "LOSS",
      signal: row["signal"] || "Untagged",
      autoTrade: row["auto trade"] === "Yes",
      hour: m ? parseInt(m[1]) : 0,
      openPrice: parseFloat(row["open price"]) || 0,
      closePrice: parseFloat(row["close price"]) || 0,
    };
  }).filter(Boolean);
}

async function fetchLiveData() {
  const status = document.getElementById("liveStatus");
  if (status) status.textContent = "Syncing...";
  try {
    const res = await fetch(SHEETS_URL + "&t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const parsed = parseCSV(text);
    if (parsed.length > 0) {
      // Merge with any locally uploaded trades
      const existingIds = new Set(ALL_TRADES.map(t => t.orderId).filter(Boolean));
      const newT = parsed.filter(t => !existingIds.has(t.orderId));
      const maxId = ALL_TRADES.reduce((m,t) => Math.max(m,t.id), 0);
      ALL_TRADES = addCumPL([...ALL_TRADES, ...newT.map((t,i) => ({...t, id: maxId+i+1}))].sort((a,b) => a.openTime.localeCompare(b.openTime)));
      render();
      if (status) status.textContent = "Live · " + new Date().toLocaleTimeString();
    }
  } catch(e) {
    console.warn("Sheets fetch failed:", e);
    if (status) status.textContent = "Offline";
  }
}

fetchLiveData(); // fetch on load
setInterval(fetchLiveData, 5 * 60 * 1000); // refresh every 5 minutes
