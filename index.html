function parsePOXlsx(file,onDone){
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const wb=XLSX.read(e.target.result,{type:"binary"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1});
      const parsed=rows.slice(1).map((row,idx)=>{
        const direction=(row[0]||"").toString().toUpperCase();
        const orderId=(row[1]||"").toString().trim();
        const openTime=(row[4]||"").toString();
        const closeTime=(row[5]||"").toString();
        const asset=(row[3]||"UNKNOWN").toString();
        const openPrice=parseFloat(row[6])||0;
        const closePrice=parseFloat(row[7])||0;
        const stake=parseFloat(row[8])||0;
        const profit=parseFloat(row[9])||0;
        const result=profit>0?"WIN":"LOSS";
        const payoutPct=stake>0&&profit>0?+(profit/stake).toFixed(4):0;
        const m=openTime.match(/(\d{1,2}):(\d{2})/);
        const hour=m?parseInt(m[1]):0;
        return{id:idx+1,orderId,openTime,closeTime,asset,direction:direction||"CALL",
               stake,payout:profit,payoutPct,result,signal:"Untagged",
               autoTrade:false,hour,openPrice,closePrice};
      }).filter(t=>t.stake>0&&t.payout!==0);
      onDone(parsed);
    }catch(err){alert("Parse error: "+err.message);}
  };
  reader.readAsBinaryString(file);
}

    if(!file) return;
    parsePOXlsx(file,(parsed)=>{
      const existingIds=new Set(trades.map(t=>t.orderId).filter(Boolean));
      const newT=parsed.filter(t=>!existingIds.has(t.orderId));
      const maxId=trades.reduce((m,t)=>Math.max(m,t.id),0);
      const merged=[...trades,...newT.map((t,i)=>({...t,id:maxId+i+1}))];
      merged.sort((a,b)=>a.openTime.localeCompare(b.openTime));
      setTrades(addCumPL(merged));

  };

  const filtered=useMemo(()=>trades.filter(t=>filterResult==="All"||t.result===filterResult),[trades,filterResult]);

    const calls=filtered.filter(t=>t.direction==="CALL");
    const puts=filtered.filter(t=>t.direction==="PUT");
    return{
      wins:wins.length,losses:filtered.length-wins.length,total:filtered.length,totalPL,
      winRate:filtered.length?wins.length/filtered.length:0,
      callWR:calls.length?calls.filter(t=>t.result==="WIN").length/calls.length:0,

    return Object.values(map).sort((a,b)=>a.date.localeCompare(b.date)).map(d=>({...d,label:d.date.slice(5)}));

              color:view===id?C.cyan:C.muted,
              border:"none",borderBottom:"2px solid "+(view===id?C.cyan:"transparent"),
              padding:"6px 18px",fontSize:12,fontWeight:700,cursor:"pointer",
              letterSpacing:1,textTransform:"uppercase"}}>
              {label}
            </button>
          ))}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>fileRef.current.click()} style={{background:"none",color:C.muted,border:"1px solid "+C.cardBorder,borderRadius:6,padding:"5px 12px",fontSize:11,cursor:"pointer"}}>
            + Upload
          </button>
          <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={handleFile}/>
          <span style={{fontSize:11,color:C.muted}}>{trades.length} trades</span>
        </div>
      </div>
      {uploadMsg&&<div style={{background:C.green+"22",borderBottom:"1px solid "+C.green+"33",padding:"7px 20px",fontSize:11,color:C.green,fontWeight:700}}>{uploadMsg}</div>}
      <div style={{padding:"8px 20px",borderBottom:"1px solid "+C.faint,display:"flex",gap:8,alignItems:"center"}}>
        {["All","WIN","LOSS"].map(r=>(
          <button key={r} onClick={()=>setFilterResult(r)} style={{
            background:filterResult===r?(r==="WIN"?C.green+"22":r==="LOSS"?C.red+"22":C.blue+"22"):"transparent",
            color:filterResult===r?(r==="WIN"?C.green:r==="LOSS"?C.red:C.cyan):C.muted,
            border:"1px solid "+(filterResult===r?(r==="WIN"?C.green+"44":r==="LOSS"?C.red+"44":C.blue+"44"):"transparent"),
            borderRadius:20,padding:"3px 14px",fontSize:11,cursor:"pointer",fontWeight:700}}>
            {r}
          </button>
        ))}
        <span style={{fontSize:10,color:C.muted,marginLeft:4}}>{filtered.length} trades</span>
      </div>
      <div style={{padding:16}}>

        {view==="dashboard"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:C.card,border:"1px solid "+C.cardBorder,borderRadius:14,padding:"20px 24px"}}>
              <div style={{fontSize:10,color:C.muted,letterSpacing:3,textTransform:"uppercase",marginBottom:8}}>Trades</div>
              <div style={{display:"flex",alignItems:"baseline",gap:12}}>
                <span style={{fontSize:36,fontWeight:800,color:C.green,fontFamily:"monospace"}}>{stats.wins+"W"}</span>
                <span style={{fontSize:28,fontWeight:300,color:C.muted}}>/</span>
                <span style={{fontSize:36,fontWeight:800,color:C.red,fontFamily:"monospace"}}>{stats.losses+"L"}</span>
              </div>
              <div style={{fontSize:11,color:C.muted,marginTop:6}}>{stats.total+" total  ·  "+(stats.winRate*100).toFixed(1)+"% win rate"}</div>
            </div>
            <div style={{background:C.card,border:"1px solid "+C.cardBorder,borderRadius:14,padding:20}}>
              <div style={{fontSize:10,color:C.muted,letterSpacing:3,textTransform:"uppercase",marginBottom:14}}>Cumulative P&L</div>
              <ResponsiveContainer width="100%" height={200}>
                <AreaChart data={plCurve}>
                  <defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="5%" stopColor={C.green} stopOpacity={0.2}/>
                    <stop offset="95%" stopColor={C.green} stopOpacity={0}/>
                  </linearGradient></defs>
                  <CartesianGrid stroke={C.faint} strokeDasharray="3 3"/>
                  <XAxis dataKey="i" tick={{fill:C.muted,fontSize:10}}/>
                  <YAxis tick={{fill:C.muted,fontSize:10}} tickFormatter={v=>"$"+v}/>
                  <Tooltip content={<TTip/>}/>
                  <ReferenceLine y={0} stroke={C.red} strokeDasharray="4 4" strokeOpacity={0.7}/>
                  <Area type="monotone" dataKey="pl" stroke={C.green} fill="url(#g1)" strokeWidth={2.5} name="Cum P&L" dot={false}/>
                </AreaChart>
              </ResponsiveContainer>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div style={{background:C.card,border:"1px solid "+C.cardBorder,borderRadius:12,padding:16}}>
                <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Win Rate</div>
                <div style={{fontSize:28,fontWeight:800,color:stats.winRate>=0.6?C.green:stats.winRate>=0.5?C.gold:C.red,fontFamily:"monospace"}}>{(stats.winRate*100).toFixed(1)+"%"}</div>
                <div style={{fontSize:10,color:C.muted,marginTop:4}}>{stats.winRate>=0.6?"Above 60% target":"Below 60% target"}</div>
                <div style={{background:C.faint,borderRadius:3,height:4,marginTop:10,overflow:"hidden"}}>
                  <div style={{width:(stats.winRate*100)+"%",height:"100%",background:stats.winRate>=0.6?C.green:stats.winRate>=0.5?C.gold:C.red}}/>
                </div>
              </div>
              <div style={{background:C.card,border:"1px solid "+C.cardBorder,borderRadius:12,padding:16}}>
                <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Total P&L</div>
                <div style={{fontSize:28,fontWeight:800,color:stats.totalPL>=0?C.green:C.red,fontFamily:"monospace"}}>{(stats.totalPL>=0?"+":"")+"$"+stats.totalPL.toFixed(2)}</div>
                <div style={{fontSize:10,color:C.muted,marginTop:4}}>All sessions combined</div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {[["CALL",C.cyan],["PUT",C.purple]].map(([dir,col])=>{
                const group=filtered.filter(t=>t.direction===dir);
                const w=group.filter(t=>t.result==="WIN").length;
                const wr=group.length?w/group.length:0;
                return(
                  <div key={dir} style={{background:C.card,border:"1px solid "+C.cardBorder,borderRadius:12,padding:16,borderTop:"3px solid "+col}}>
                    <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>{dir}</div>
                    <div style={{fontSize:24,fontWeight:800,color:wr>=0.6?C.green:wr>=0.5?C.gold:C.red,fontFamily:"monospace"}}>{(wr*100).toFixed(1)+"%"}</div>
                    <div style={{fontSize:11,color:C.muted,marginTop:4}}>{w+"W / "+(group.length-w)+"L"}</div>
                    <div style={{background:C.faint,borderRadius:3,height:4,marginTop:10,overflow:"hidden"}}>
                      <div style={{width:(wr*100)+"%",height:"100%",background:wr>=0.6?C.green:wr>=0.5?C.gold:C.red}}/>
                    </div>
                  </div>
                );
              })}
            </div>
            {(()=>{
              const dayMap={};
              filtered.forEach(t=>{
                const date=t.openTime?t.openTime.slice(0,10):"";
                if(!date) return;
                if(!dayMap[date])dayMap[date]={date,wins:0,losses:0,pl:0};
                dayMap[date][t.result==="WIN"?"wins":"losses"]++;
                dayMap[date].pl=+(dayMap[date].pl+t.payout).toFixed(2);
              });
              const days=Object.values(dayMap).map(d=>({...d,total:d.wins+d.losses,wr:d.wins/(d.wins+d.losses)})).filter(d=>d.total>=3).sort((a,b)=>b.wr-a.wr);
              const bestDay=days[0]||null;
              const hourMap={};
              filtered.forEach(t=>{
                if(!hourMap[t.hour])hourMap[t.hour]={hour:t.hour,wins:0,losses:0,pl:0};
                hourMap[t.hour][t.result==="WIN"?"wins":"losses"]++;
                hourMap[t.hour].pl=+(hourMap[t.hour].pl+t.payout).toFixed(2);
              });
              const hours=Object.values(hourMap).map(h=>({...h,total:h.wins+h.losses,wr:h.wins/(h.wins+h.losses)})).filter(h=>h.total>=3).sort((a,b)=>b.wr-a.wr);
              const qualified=hours.filter(h=>h.wr>=0.5).map(h=>h.hour).sort((a,b)=>a-b);
              const runs=[];
              if(qualified.length){let run=[qualified[0]];for(let i=1;i<qualified.length;i++){if(qualified[i]-qualified[i-1]<=2)run.push(qualified[i]);else{runs.push(run);run=[qualified[i]];}}runs.push(run);}
              const scored=runs.map(r=>{const rh=r.map(h=>hours.find(x=>x.hour===h)).filter(Boolean);const avgWr=rh.reduce((s,h)=>s+h.wr,0)/rh.length;const totalPl=+rh.reduce((s,h)=>s+h.pl,0).toFixed(2);const totalW=rh.reduce((s,h)=>s+h.wins,0);const totalL=rh.reduce((s,h)=>s+h.losses,0);return{start:r[0],end:r[r.length-1]+1,avgWr,totalPl,totalW,totalL,score:avgWr*r.length};}).sort((a,b)=>b.score-a.score);
              const bestWindow=scored[0]||null;
              return(
                <div style={{background:C.card,border:"1px solid "+C.gold+"44",borderRadius:12,padding:16}}>
                  <div style={{fontSize:10,color:C.gold,letterSpacing:2,textTransform:"uppercase",marginBottom:14}}>All-Time Best</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    <div style={{background:C.faint,borderRadius:10,padding:"14px 16px"}}>
                      <div style={{fontSize:9,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Best Day</div>
                      {bestDay?(<>
                        <div style={{fontSize:18,fontWeight:800,color:C.gold,fontFamily:"monospace"}}>{new Date(bestDay.date+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</div>
                        <div style={{fontSize:22,fontWeight:800,color:C.green,marginTop:4}}>{(bestDay.wr*100).toFixed(0)+"%"}</div>
                        <div style={{fontSize:10,color:C.muted,marginTop:4}}>{bestDay.wins+"W / "+bestDay.losses+"L"}</div>
                        <div style={{fontSize:11,color:bestDay.pl>=0?C.green:C.red,fontWeight:700,marginTop:2}}>{(bestDay.pl>=0?"+":"")+"$"+bestDay.pl}</div>
                      </>):(<div style={{fontSize:11,color:C.muted}}>Need 3+ trades/day</div>)}
                    </div>
                    <div style={{background:C.faint,borderRadius:10,padding:"14px 16px"}}>
                      <div style={{fontSize:9,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Best Time Window</div>
                      {bestWindow?(<>
                        <div style={{fontSize:18,fontWeight:800,color:C.gold,fontFamily:"monospace"}}>{fmtHour(bestWindow.start)+" – "+fmtHour(bestWindow.end)}</div>
                        <div style={{fontSize:22,fontWeight:800,color:C.green,marginTop:4}}>{(bestWindow.avgWr*100).toFixed(0)+"% avg"}</div>
                        <div style={{fontSize:10,color:C.muted,marginTop:4}}>{bestWindow.totalW+"W / "+bestWindow.totalL+"L"}</div>
                        <div style={{fontSize:11,color:bestWindow.totalPl>=0?C.green:C.red,fontWeight:700,marginTop:2}}>{(bestWindow.totalPl>=0?"+":"")+"$"+bestWindow.totalPl}</div>
                      </>):(<div style={{fontSize:11,color:C.muted}}>Not enough data yet</div>)}
                    </div>
                  </div>
                </div>
              );
            })()}
          </div>
        )}

        {view==="today"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {(()=>{
              const today=new Date().toISOString().slice(0,10);
              const todayTrades=filtered.filter(t=>t.openTime&&t.openTime.startsWith(today));
              const tw=todayTrades.filter(t=>t.result==="WIN").length;
              const tl=todayTrades.filter(t=>t.result==="LOSS").length;
              const tpl=+todayTrades.reduce((s,t)=>s+t.payout,0).toFixed(2);
              const twr=todayTrades.length?tw/todayTrades.length:0;
              if(todayTrades.length===0) return(
                <div style={{background:C.card,border:"1px solid "+C.cardBorder,borderRadius:14,padding:"40px 24px",textAlign:"center"}}>
                  <div style={{fontSize:32,marginBottom:12}}>📭</div>
                  <div style={{fontSize:14,color:C.muted}}>No trades yet today</div>
                  <div style={{fontSize:11,color:C.muted,marginTop:6}}>Upload today's XLSX to see results</div>
                </div>
              );
              const byHour={};
              todayTrades.forEach(t=>{
                if(!byHour[t.hour])byHour[t.hour]={hour:t.hour,wins:0,losses:0,pl:0};
                byHour[t.hour][t.result==="WIN"?"wins":"losses"]++;
                byHour[t.hour].pl=+(byHour[t.hour].pl+t.payout).toFixed(2);
              });
              const hours=Object.values(byHour).map(h=>({...h,total:h.wins+h.losses,wr:h.wins/(h.wins+h.losses),wrPct:+(h.wins/(h.wins+h.losses)*100).toFixed(1)})).sort((a,b)=>parseInt(a.hour)-parseInt(b.hour));
              const best=hours.reduce((b,h)=>h.wr>(b?b.wr:0)?h:b,null);
              const qualified=hours.filter(h=>h.wr>=0.5&&h.total>=1).map(h=>h.hour).sort((a,b)=>a-b);
              const runs=[];if(qualified.length){let run=[qualified[0]];for(let i=1;i<qualified.length;i++){if(qualified[i]-qualified[i-1]<=2)run.push(qualified[i]);else{runs.push(run);run=[qualified[i]];}}runs.push(run);}
              const scored=runs.map(r=>{const rh=r.map(h=>hours.find(x=>x.hour===h)).filter(Boolean);const avgWr=rh.reduce((s,h)=>s+h.wr,0)/rh.length;const totalPl=+rh.reduce((s,h)=>s+h.pl,0).toFixed(2);const totalW=rh.reduce((s,h)=>s+h.wins,0);const totalL=rh.reduce((s,h)=>s+h.losses,0);return{start:r[0],end:r[r.length-1]+1,avgWr,totalPl,totalW,totalL,score:avgWr*r.length};}).sort((a,b)=>b.score-a.score);
              const bestWin=scored[0]||null;
              const worstHour=hours.filter(h=>h.total>=1).sort((a,b)=>a.wr-b.wr)[0]||null;
              return(<>
                <div style={{background:C.card,border:"1px solid "+C.cardBorder,borderRadius:14,padding:"20px 24px"}}>
                  <div style={{fontSize:10,color:C.muted,letterSpacing:3,textTransform:"uppercase",marginBottom:8}}>Today · {new Date().toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"})}</div>
                  <div style={{display:"flex",alignItems:"baseline",gap:12,marginBottom:6}}>
                    <span style={{fontSize:36,fontWeight:800,color:C.green,fontFamily:"monospace"}}>{tw+"W"}</span>
                    <span style={{fontSize:28,fontWeight:300,color:C.muted}}>/</span>
                    <span style={{fontSize:36,fontWeight:800,color:C.red,fontFamily:"monospace"}}>{tl+"L"}</span>
                  </div>
                  <div style={{fontSize:11,color:C.muted}}>{todayTrades.length+" trades  ·  "+(twr*100).toFixed(1)+"% win rate"}</div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <div style={{background:C.card,border:"1px solid "+C.cardBorder,borderRadius:12,padding:16}}>
                    <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Today P&L</div>
                    <div style={{fontSize:28,fontWeight:800,color:tpl>=0?C.green:C.red,fontFamily:"monospace"}}>{(tpl>=0?"+":"")+"$"+tpl.toFixed(2)}</div>
                  </div>
                  <div style={{background:C.card,border:"1px solid "+C.cardBorder,borderRadius:12,padding:16}}>
                    <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Win Rate</div>
                    <div style={{fontSize:28,fontWeight:800,color:twr>=0.6?C.green:twr>=0.5?C.gold:C.red,fontFamily:"monospace"}}>{(twr*100).toFixed(1)+"%"}</div>
                    <div style={{background:C.faint,borderRadius:3,height:4,marginTop:10,overflow:"hidden"}}>
                      <div style={{width:(twr*100)+"%",height:"100%",background:twr>=0.6?C.green:twr>=0.5?C.gold:C.red}}/>
                    </div>
                  </div>
                </div>
                <div style={{background:C.card,border:"1px solid "+C.cardBorder,borderRadius:12,padding:16}}>
                  <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:14}}>Win Rate by Hour</div>
                  <ResponsiveContainer width="100%" height={180}>
                    <BarChart data={hours} barCategoryGap="20%">
                      <CartesianGrid stroke={C.faint} strokeDasharray="3 3" vertical={false}/>
                      <XAxis dataKey={d=>fmtHour(d.hour)} tick={{fill:C.muted,fontSize:9}} axisLine={false} tickLine={false}/>
                      <YAxis tick={{fill:C.muted,fontSize:9}} domain={[0,100]} unit="%" axisLine={false} tickLine={false}/>
                      <Tooltip content={({active,payload})=>{if(!active||!payload||!payload.length)return null;const d=payload[0].payload;return(<div style={{background:C.surface,border:"1px solid "+C.cardBorder,borderRadius:8,padding:"10px 14px",fontSize:12}}><div style={{color:C.gold,fontWeight:700,marginBottom:4}}>{fmtHour(d.hour)}</div><div style={{color:d.wr>=0.6?C.green:d.wr>=0.5?C.gold:C.red,fontWeight:800,fontSize:16}}>{d.wrPct+"%"}</div><div style={{color:C.muted,fontSize:11,marginTop:4}}>{d.wins+"W / "+d.losses+"L"}</div><div style={{color:d.pl>=0?C.green:C.red,fontWeight:700,marginTop:2}}>{(d.pl>=0?"+":"")+"$"+d.pl}</div></div>);}}/>
                      <ReferenceLine y={60} stroke={C.gold} strokeDasharray="4 4" strokeOpacity={0.6}/>
                      <Bar dataKey="wrPct" name="Win Rate %" radius={[5,5,0,0]} maxBarSize={36}>
                        {hours.map((h,i)=>{const isBest=best&&best.hour===h.hour;return <Cell key={i} fill={isBest?C.gold:h.wr>=0.6?C.green:h.wr>=0.5?C.cyan:C.red} fillOpacity={0.9}/>;} )}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
                <div style={{background:C.card,border:"1px solid "+C.gold+"44",borderRadius:12,padding:20}}>
                  <div style={{fontSize:10,color:C.gold,letterSpacing:2,textTransform:"uppercase",marginBottom:16}}>Best Time to Trade Today</div>
                  {bestWin?(<>
                    <div style={{fontSize:38,fontWeight:800,color:C.gold,fontFamily:"monospace",lineHeight:1,marginBottom:6}}>{fmtHour(bestWin.start)+" – "+fmtHour(bestWin.end)}</div>
                    <div style={{fontSize:26,fontWeight:800,color:bestWin.avgWr>=0.6?C.green:C.gold,marginBottom:8}}>{(bestWin.avgWr*100).toFixed(0)+"% avg win rate"}</div>
                    <div style={{fontSize:12,color:C.muted,marginBottom:4}}>{bestWin.totalW+"W / "+bestWin.totalL+"L  ·  "+(bestWin.totalPl>=0?"+":"")+"$"+bestWin.totalPl}</div>
                    <div style={{background:C.faint,borderRadius:3,height:5,marginTop:12,overflow:"hidden"}}>
                      <div style={{width:(bestWin.avgWr*100)+"%",height:"100%",background:bestWin.avgWr>=0.6?C.green:C.gold,borderRadius:3}}/>
                    </div>
                    {worstHour&&worstHour.wr<0.4&&(<div style={{marginTop:14,padding:"8px 12px",background:C.red+"10",border:"1px solid "+C.red+"33",borderRadius:8,fontSize:11,color:C.muted}}>{"Avoid: "}<span style={{color:C.red,fontWeight:700}}>{fmtHour(worstHour.hour)}</span>{" — "+Math.round(worstHour.wr*100)+"% win rate today"}</div>)}
                  </>):(<div style={{fontSize:12,color:C.muted}}>Not enough data yet for today</div>)}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  <div style={{fontSize:10,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>Today's Trades</div>
                  {todayTrades.slice().reverse().map(t=>(
                    <div key={t.id} style={{display:"grid",gridTemplateColumns:"50px 55px 70px 1fr 55px 65px",gap:8,padding:"10px 14px",background:C.card,border:"1px solid "+C.cardBorder,borderLeft:"3px solid "+(t.result==="WIN"?C.green:C.red),borderRadius:8,alignItems:"center",fontSize:11}}>
                      <div style={{color:C.muted,fontSize:10}}>{t.openTime&&t.openTime.slice(11,16)}</div>
                      <Tag color={t.result==="WIN"?C.green:C.red}>{t.result}</Tag>
                      <Tag color={t.direction==="CALL"?C.cyan:C.purple}>{t.direction}</Tag>
                      <div style={{color:C.muted,fontSize:10}}>{"$"+(t.stake||0).toFixed(0)+" stake"}</div>
                      <div style={{color:t.payout>=0?C.green:C.red,fontWeight:700,fontSize:11,textAlign:"right"}}>{(t.payout>=0?"+":"")+"$"+Math.abs(t.payout).toFixed(0)}</div>
                      <div style={{fontSize:10,color:C.muted,textAlign:"right"}}>{t.openPrice&&t.openPrice.toFixed(5)}</div>
                    </div>
                  ))}
                </div>
              </>);
            })()}
          </div>
        )}

        {view==="trades"&&(
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            <div style={{display:"grid",gridTemplateColumns:"40px 60px 130px 90px 60px 70px 70px 50px",gap:8,padding:"6px 12px",fontSize:9,color:C.muted,letterSpacing:2,textTransform:"uppercase"}}>
              {["#","Result","Time","Asset","Dir","Stake","P&L",""].map(h=><div key={h}>{h}</div>)}
            </div>
            {filtered.slice().reverse().map(t=>(
              <div key={t.id} onClick={()=>setSelectedTrade(t)} style={{display:"grid",gridTemplateColumns:"40px 60px 130px 90px 60px 70px 70px 50px",gap:8,padding:"10px 12px",background:C.card,border:"1px solid "+C.cardBorder,borderLeft:"3px solid "+(t.result==="WIN"?C.green:C.red),borderRadius:8,alignItems:"center",fontSize:11,cursor:"pointer"}}>
                <div style={{color:C.muted,fontSize:10}}>{"#"+t.id}</div>
                <Tag color={t.result==="WIN"?C.green:C.red}>{t.result}</Tag>
                <div style={{color:C.muted,fontSize:10}}>{t.openTime&&t.openTime.slice(0,16)}</div>
                <div style={{color:C.gold,fontWeight:700,fontSize:10}}>{t.asset}</div>
                <Tag color={t.direction==="CALL"?C.cyan:C.purple}>{t.direction}</Tag>
                <div style={{color:C.text,fontSize:10}}>{"$"+(t.stake||0).toFixed(0)}</div>
                <div style={{color:t.payout>=0?C.green:C.red,fontWeight:700,fontSize:10}}>{(t.payout>=0?"+":"")+"$"+Math.abs(t.payout||0).toFixed(0)}</div>
                <div style={{color:C.blue,fontSize:10}}>→</div>
              </div>
            ))}
          </div>
        )}
      </div>
      {selectedTrade&&<TradeModal trade={selectedTrade} onClose={()=>setSelectedTrade(null)}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<POTrader/>);
</script>
</body>
</html>
